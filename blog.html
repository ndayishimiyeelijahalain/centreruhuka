<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="blog_title">Blog & Événements – RUHUKA_CENTRE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">RUHUKA_CENTRE</div>

  <div class="menu-toggle">☰</div>

  <nav>
  <div id="hamburger" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <ul id="nav-menu">
    <li><a href="index.html" data-i18n="nav_home"></a></li>
    <li><a href="about.html" data-i18n="nav_about"></a></li>
    <li><a href="services.html" data-i18n="nav_services"></a></li>
    <li><a href="team.html" data-i18n="nav_team"></a></li>
    <li><a href="blog.html" data-i18n="nav_blog"></a></li>
    <li><a href="appointment.html" data-i18n="nav_appointment"></a></li>
  </ul>
</nav>

  <div class="lang-switch">
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('sw')">SW</button>
    <button onclick="setLang('rn')">RN</button>
  </div>
</header>

<main>
<section class="fade-in">
  <h2 data-i18n="blog_title">Blog & Événements</h2>
  <p data-i18n="blog_intro"></p>

  <div id="blogContainer"></div>
</section>
</main>

<footer>
<p>© 2026 Centre Ruhuka</p>
</footer>

<script src="blog-data.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const toggle = document.querySelector(".menu-toggle");
  const menu = document.querySelector("nav ul");

  if(toggle && menu){
    toggle.addEventListener("click", () => {
      menu.classList.toggle("show-menu");
    });
  }
});
</script>

</body>
</html>
